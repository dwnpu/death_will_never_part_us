<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>death_will_never_part_us.exe</title>
<style>
:root {
  --bg:#070707;
  --panel:#101010;
  --panel2:#151515;
  --line:#252525;
  --text:#eeeeee;
  --soft:#909090;
  --dim:#555;
  --error:#ff2b3a;
  --pink:#ff4fa3;
  --mono:"SFMono-Regular","Consolas","Menlo","Courier New","Yu Gothic","Hiragino Kaku Gothic ProN",monospace;
}

* { box-sizing:border-box; }

html,body {
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
}

body {
  padding:24px;
  overflow-x:hidden;
  overflow-y:auto;
}

#run {
  position:absolute;
  opacity:0;
  pointer-events:none;
}

.page {
  display:block;
  width:min(1180px,100%);
  margin:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  z-index:5;
}

#run:checked + .page {
  pointer-events:none;
  cursor:default;
}

.window {
  border:1px solid var(--line);
  background:rgba(16,16,16,.96);
  overflow:hidden;
  box-shadow:0 0 52px rgba(0,0,0,.42);
  min-height:calc(100vh - 48px);
}

#run:checked + .page .window {
  animation:windowTransparent 10s ease forwards;
  animation-delay:25.24s;
}

.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  background:var(--panel2);
}

.left {
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.dot-window {
  width:10px;
  height:10px;
  border-radius:50%;
  background:#333;
  flex:0 0 auto;
}

.filename {
  margin-left:10px;
  font-size:12px;
  color:var(--soft);
  white-space:nowrap;
  overflow:visible;
  text-overflow:clip;
}

.state {
  font-size:11px;
  color:var(--soft);
  white-space:nowrap;
}

.state::after {
  content:" :: WAITING";
}

#run:checked + .page .state::after {
  content:" :: RUNNING";
  color:var(--text);
}

.tabs {
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:28px;
  border-bottom:1px solid var(--line);
  background:#0d0d0d;
  padding:0 18px;
  overflow-x:auto;
  overflow-y:hidden;
}

.tab {
  padding:14px 0;
  color:var(--soft);
  font-size:12px;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  flex:0 0 auto;
}

.tab.active {
  color:var(--text);
  border-bottom-color:var(--text);
}

.editor {
  display:grid;
  grid-template-columns:64px minmax(0,1fr);
}

.lines {
  background:#101010;
  border-right:1px solid var(--line);
  padding:18px 0;
  text-align:right;
  color:var(--dim);
  user-select:none;
}

.lines div {
  min-height:28px;
  padding-right:14px;
  font-size:12px;
  line-height:28px;
}

.code {
  padding:18px 24px 34px;
  overflow-x:auto;
  position:relative;
  z-index:8;
}

.code-line {
  min-height:28px;
  line-height:28px;
  white-space:pre-wrap;
  word-break:break-word;
  font-size:14px;
  color:#eaeaea;
}

.code-line.blank {
  opacity:0;
}

#run:checked + .page .code-line.blank {
  animation:showLine .01s linear forwards;
  animation-delay:var(--delay);
}

.char {
  opacity:0;
}

.code-line.first .char {
  opacity:1;
}

.code-line.first::after {
  content:"▋";
  margin-left:4px;
  color:#f2f2f2;
  animation:blink 1s steps(2,end) infinite;
}

#run:checked + .page .code-line.first::after {
  content:"";
  animation:none;
}

#run:checked + .page .char {
  animation:showChar .01s linear forwards;
  animation-delay:var(--cdelay);
}

.error,
.error .char {
  color:var(--error);
}

.success,
.success .char {
  color:#f5f5f5;
}

.poem {
  color:var(--pink);
  position:relative;
  z-index:12;
}

.poem .char {
  color:inherit;
}

#run:checked + .page .poem .char {
  animation:showChar .01s linear forwards;
  animation-delay:var(--cdelay);
}

.dots {
  color:#eaeaea;
}

.dots span {
  opacity:0;
}

#run:checked + .page .dots .dot-one {
  animation:showChar .01s linear forwards;
  animation-delay:calc(var(--delay) + .55s);
}

#run:checked + .page .dots .dot-two {
  animation:showChar .01s linear forwards;
  animation-delay:calc(var(--delay) + 1.15s);
}

#run:checked + .page .dots .dot-three {
  animation:showChar .01s linear forwards;
  animation-delay:calc(var(--delay) + 1.75s);
}

.cursor {
  opacity:0;
  min-height:28px;
}

#run:checked + .page .cursor {
  animation:showLine .01s linear forwards, cursorOut 3s ease forwards;
  animation-delay:24.04s, calc(25.24s + 3.2s);
}

.cursor::after {
  content:"▋";
  color:#f2f2f2;
  animation:blink 1s steps(2,end) infinite;
}

.hint {
  padding:12px 16px;
  border-top:1px solid var(--line);
  color:var(--soft);
  font-size:11px;
  background:#101010;
  display:flex;
  justify-content:space-between;
  gap:16px;
}

#run:checked + .page .hint-start {
  display:none;
}

/* 后半：枠・タブ・行番号・白文字ログを消す */
#run:checked + .page .topbar,
#run:checked + .page .tabs,
#run:checked + .page .lines,
#run:checked + .page .hint {
  animation:uiOut 9.5s ease forwards;
  animation-delay:calc(25.24s + 2.2s);
}

#run:checked + .page .code-line:not(.poem):not(.blank):not(.cursor) {
  animation:logOut 8.5s ease forwards;
  animation-delay:calc(25.24s + 3.4s);
}

#run:checked + .page .poem {
  animation:poemToWhite 10.5s ease forwards;
  animation-delay:25.24s;
}

.video-stars,
.white-veil {
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.video-stars {
  z-index:2;
  opacity:0;
}

.video-stars video {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.video-stars video {
  opacity:.66;
  filter:brightness(1.18) contrast(1.05);
  mix-blend-mode:screen;
}



#run:checked ~ .video-stars {
  animation:starsIn 14s ease forwards;
  animation-delay:25.24s;
}

#run:checked ~ .white-veil {
  z-index:3;
  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,0),
      rgba(255,245,252,.05) 38%,
      rgba(255,255,255,.13) 72%,
      rgba(255,255,255,.20)
    );
  opacity:0;
}

#run:checked ~ .white-veil {
  animation:veilIn 13s ease forwards;
  animation-delay:calc(25.24s + 2s);
}

@keyframes showChar {
  to { opacity:1; }
}

@keyframes showLine {
  to { opacity:1; }
}

@keyframes blink {
  50% { opacity:0; }
}

@keyframes starsIn {
  0% { opacity:0; }
  24% { opacity:.22; }
  68% { opacity:.48; }
  100% { opacity:.62; }
}


  42% { opacity:.12; }
  100% { opacity:.42; }
}

@keyframes veilIn {
  0% { opacity:0; }
  48% { opacity:.06; }
  100% { opacity:.18; }
}

@keyframes windowTransparent {
  0% {
    border-color:var(--line);
    background:rgba(16,16,16,.96);
    box-shadow:0 0 52px rgba(0,0,0,.42);
  }
  60% {
    border-color:rgba(255,255,255,.12);
    background:rgba(16,16,16,.42);
    box-shadow:0 0 40px rgba(255,220,245,.10);
  }
  100% {
    border-color:rgba(255,255,255,0);
    background:rgba(16,16,16,0);
    box-shadow:none;
  }
}

@keyframes uiOut {
  0% {
    opacity:1;
    filter:blur(0);
  }
  100% {
    opacity:0;
    filter:blur(4px);
  }
}

@keyframes logOut {
  0% {
    opacity:1;
    filter:blur(0);
  }
  100% {
    opacity:0;
    filter:blur(3px);
  }
}

@keyframes cursorOut {
  to { opacity:0; }
}

@keyframes poemToWhite {
  0% {
    color:var(--pink);
    text-shadow:none;
  }
  45% {
    color:#ffc2df;
    text-shadow:0 0 8px rgba(255,120,189,.22);
  }
  100% {
    color:#fff;
    text-shadow:
      0 0 8px rgba(255,255,255,.82),
      0 0 18px rgba(255,210,235,.38);
  }
}

@media(max-width:760px) {
  body {
    padding:12px;
    overflow-y:auto;
  }

  .window {
    min-height:calc(100vh - 24px);
  }

  .topbar {
    padding:12px 14px;
  }

  .filename {
    font-size:11px;
    max-width:none;
  }

  .state {
    display:none;
  }

  .tabs {
    gap:22px;
    padding:0 14px;
  }

  .editor {
    grid-template-columns:48px minmax(0,1fr);
  }

  .lines div {
    font-size:11px;
    padding-right:10px;
  }

  .code {
    padding:18px 14px 32px;
  }

  .code-line {
    font-size:12px;
  }

  .video-stars video {
    opacity:.70;
  }

  
}
</style>
</head>

<div class="video-stars">
  <video id="wheatVideo" muted autoplay loop playsinline preload="auto">
    <source src="stars.mp4" type="video/mp4">
  </video>
</div>

<div class="white-veil"></div>



<script>
(function(){
  const videos = Array.from(document.querySelectorAll('video'));
  let started = false;

  async function startVideos(){
    if(started) return;
    started = true;

    for(const video of videos){
      try{
        video.muted = true;
        video.defaultMuted = true;
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        video.playsInline = true;
        video.loop = true;
        video.load();
        video.currentTime = 0;
        await video.play();
      }catch(e){}
    }

    setTimeout(function(){
      videos.forEach(function(video){
        try{
          if(video.paused) video.play().catch(function(){});
        }catch(e){}
      });
    }, 900);
  }

  document.addEventListener('pointerdown', startVideos, { once:true });
  document.addEventListener('touchstart', startVideos, { once:true, passive:true });
  document.addEventListener('click', startVideos, { once:true });
})();
</script>
