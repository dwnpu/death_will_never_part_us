<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>death_will_never_part_us.exe</title>

<style>

:root{

--bg:#070707;

--panel:#101010;

--panel2:#151515;

--line:#252525;

--text:#eeeeee;

--soft:#909090;

--dim:#555;

--error:#ff2b3a;

--pink:#ff4fa3;

--mono:"SFMono-Regular","Consolas","Menlo","Courier New","Yu Gothic",monospace;

}

*{

box-sizing:border-box;

}

html,body{

margin:0;

min-height:100%;

background:var(--bg);

color:var(--text);

font-family:var(--mono);

}

body{

padding:24px;

}

#run{

position:absolute;

opacity:0;

pointer-events:none;

}

.page{

display:block;

width:min(1180px,100%);

margin:auto;

cursor:pointer;

-webkit-tap-highlight-color:transparent;

}

.window{

border:1px solid var(--line);

background:var(--panel);

overflow:hidden;

box-shadow:0 0 52px rgba(0,0,0,.42);

}

.topbar{

display:flex;

align-items:center;

justify-content:space-between;

padding:12px 16px;

border-bottom:1px solid var(--line);

background:var(--panel2);

}

.left{

display:flex;

align-items:center;

gap:10px;

}

.dot-window{

width:10px;

height:10px;

border-radius:50%;

background:#333;

}

.filename{

margin-left:10px;

font-size:12px;

color:var(--soft);

}

.state{

font-size:11px;

color:var(--soft);

}

.state::after{

content:" :: WAITING";

}

#run:checked + .page .state::after{

content:" :: RUNNING";

color:var(--text);

}

.layout{

display:grid;

grid-template-columns:170px 1fr;

}

.sidebar{

border-right:1px solid var(--line);

background:#0d0d0d;

padding:18px 0;

}

.nav{

padding:12px 18px;

color:var(--soft);

font-size:12px;

border-left:2px solid transparent;

}

.nav.active{

color:var(--text);

border-left-color:var(--text);

}

.editor{

display:grid;

grid-template-columns:64px 1fr;

}

.lines{

background:#101010;

border-right:1px solid var(--line);

padding:18px 0;

text-align:right;

color:var(--dim);

user-select:none;

}

.lines div{

height:28px;

padding-right:14px;

font-size:12px;

line-height:28px;

}

.code{

padding:18px 24px;

overflow-x:auto;

}

.code-line{

min-height:28px;

line-height:28px;

white-space:pre-wrap;

font-size:14px;

}

.code-line span{

opacity:0;

animation:show .01s linear forwards;

animation-delay:var(--delay);

}

.error{

color:var(--error);

}

.poem{

color:var(--pink);

}

.cursor{

opacity:0;

}

#run:checked + .page .cursor{

animation:show .01s linear forwards;

animation-delay:12s;

}

.cursor::after{

content:"▋";

color:#fff;

animation:blink 1s steps(2,end) infinite;

}

.hint{

padding:12px 16px;

border-top:1px solid var(--line);

font-size:11px;

color:var(--soft);

background:#101010;

}

@keyframes show{

to{

opacity:1;

}

}

@keyframes blink{

50%{

opacity:0;

}

}

@media(max-width:760px){

body{

padding:12px;

}

.layout{

grid-template-columns:1fr;

}

.sidebar{

display:flex;

overflow:auto;

border-right:none;

border-bottom:1px solid var(--line);

padding:0;

}

.nav{

white-space:nowrap;

border-left:none;

border-bottom:2px solid transparent;

}

.nav.active{

border-bottom-color:var(--text);

}

.editor{

grid-template-columns:48px 1fr;

}

.code{

padding:18px 14px;

}

}

</style>

</head>

<body>

<input type="radio" id="run">

<label class="page" for="run">

<div class="window">

<div class="topbar">

<div class="left">

<div class="dot-window"></div>

<div class="dot-window"></div>

<div class="dot-window"></div>

<div class="filename">death_will_never_part_us.exe</div>

</div>

<div class="state">STATUS</div>

</div>

<div class="layout">

<aside class="sidebar">

<div class="nav active">MEMORY</div>

<div class="nav">LINK</div>

<div class="nav">ECHO</div>

<div class="nav">PERSISTENCE</div>

</aside>

<div>

<div class="editor">

<div class="lines">

<div>1</div>

<div>2</div>

<div>3</div>

<div>4</div>

<div>5</div>

<div>6</div>

<div>7</div>

<div>8</div>

<div>9</div>

<div>10</div>

<div>11</div>

<div>12</div>

<div>13</div>

<div>14</div>

</div>

<div class="code">

<div class="code-line">

<span style="--delay:.4s">[ process_start ]</span>

</div>

<div class="code-line">

<span style="--delay:1.1s">initializing death_will_never_part_us.exe...</span>

</div>

<div class="code-line">

<span style="--delay:2s">loading persistent_memory...</span>

</div>

<div class="code-line">

<span style="--delay:3s">checking life_signal...</span>

</div>

<div class="code-line">

<span style="--delay:4s">life_signal :: lost</span>

</div>

<div class="code-line">

<span style="--delay:5s">detecting separation_request...</span>

</div>

<div class="code-line">

<span style="--delay:6s">cause :: death</span>

</div>

<div class="code-line">

<span style="--delay:7s">executing separation_process...</span>

</div>

<div class="code-line">

<span style="--delay:8s">...</span>

</div>

<div class="code-line error">

<span style="--delay:10s">ERROR :: separation_failed</span>

</div>

<div class="code-line">

<span style="--delay:11s">connection.status :: maintained</span>

</div>

<div class="code-line poem">

<span style="--delay:12s">Death will never part us.</span>

</div>

<div class="code-line poem">

<span style="--delay:13s">Side by side, we conquer the dark and cherish the dawn.</span>

</div>

<div class="code-line poem">

<span style="--delay:14s">「死が、決して僕たちを引き裂くことはない。」</span>

</div>

<div class="cursor"></div>

</div>

</div>

<div class="hint">

tap once to execute memory

</div>

</div>

</div>

</div>

</label>

</body>

</html>
